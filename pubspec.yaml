name: clubera
description: "Clubera - Amateur Football Club Platform"
publish_to: 'none'

version: 1.1.0+11

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_crashlytics: ^4.1.3
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
  google_sign_in: ^6.2.1

  # State
  provider: ^6.1.2

  # UI
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  path_provider: ^2.1.4
  connectivity_plus: ^6.0.2
  share_plus: ^10.1.4
  local_auth: ^2.3.0
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0F1729"
  image: assets/images/logo.jpeg
  android_12:
    image: assets/images/logo.jpeg
    color: "#0F1729"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/adi-registration.properties
